[paths]
project_root = C:\IPCCH_monthly_operational
source_data_root = C:\IPCCH_source_data
polygon_input = ${PROJECT_ROOT}\Outcome\ipcch_unified\spatial\ipcch_admin_geometry.shp
scaffold_input = ${PROJECT_ROOT}\Outcome\ipcch_unified\interim\ipcch_scaffold_202604.csv
reference_scaffold_input = ${PROJECT_ROOT}\Outcome\ipcch_unified\interim\ipcch_scaffold_202501_202604.csv
historical_panel_input = ${PROJECT_ROOT}\Outcome\ipcch_unified\raw\IPCCH_2026_completed.csv
area_lookup = ${PROJECT_ROOT}\Outcome\ipcch_unified\spatial\unique_area_id_lat_lon.csv
country_area_lookup = ${PROJECT_ROOT}\Outcome\ipcch_unified\country_area_id_lookup.csv
fixed_slow_features_input = ${PROJECT_ROOT}\Outcome\ipcch_unified\features\ipcch_fixed_slow_features_by_area.csv
model_input_output_folder = ${PROJECT_ROOT}\Outcome\ipcch_unified\model_input
fixed_slow_source_vintage_manifest = ${PROJECT_ROOT}\Outcome\ipcch_unified\metadata\ipcch_fixed_slow_source_vintage_manifest.csv
variable_codebook = ${PROJECT_ROOT}\Outcome\ipcch_unified\metadata\variable_codebook_reorganized.csv
output_root = C:\IPCCH_outputs

[production]
target_year = 2026
target_month = 4
monthly_model_input_output = C:\IPCCH_outputs\model_input\ipcch_model_compatible_input_202604.csv
monthly_base_input_output = ${PROJECT_ROOT}\Outcome\ipcch_unified\model_input\ipcch_monthly_base_input_202604.csv
monthly_base_input_summary = ${PROJECT_ROOT}\Outcome\ipcch_unified\model_input\ipcch_monthly_base_input_202604_summary.json

[identifiers]
ipc_area_id = area_id
ch_admin_code = admin_code
arcpy_zone_field = fid
canonical_model_key = area_id,year,month
current_handover_key = admin_code,lat,lon,year,month

[schema]
schema_folder = ${PROJECT_ROOT}\Outcome\ipcch_unified\schema
base_panel_schema = ${PROJECT_ROOT}\Outcome\ipcch_unified\schema\ipcch_base_panel_schema.csv
feature_family_contract = ${PROJECT_ROOT}\Outcome\ipcch_unified\schema\ipcch_feature_family_contract.csv
model_input_contract = ${PROJECT_ROOT}\Outcome\ipcch_unified\schema\ipcch_model_input_contract.md

[evi]
raw_raster_folder = C:\IPCCH_source_data\EVI\MODIS_MOD13A3_Monthly
output_folder = C:\IPCCH_source_data\EVI\output_ch
filename_pattern = MOD13A3_*.tif
zone_field = admin_code

[fldas]
part1_folder = C:\IPCCH_source_data\FEWSNET_predictors\FLDAS_Monthly\Part1
part2_folder = C:\IPCCH_source_data\FEWSNET_predictors\FLDAS_Monthly\Part2
part3_folder = C:\IPCCH_source_data\FEWSNET_predictors\FLDAS_Monthly\Part3
part4_folder = C:\IPCCH_source_data\FEWSNET_predictors\FLDAS_Monthly\Part4
output_folder = C:\IPCCH_source_data\FEWSNET_predictors\output_ch
filename_pattern = *_all_bands.tif
zone_field = fid
max_processes = 4

[gosif_gpp]
download_folder_mean = C:\IPCCH_source_data\GOSIF_GPP\downloads_mean
download_folder_sd = C:\IPCCH_source_data\GOSIF_GPP\downloads_sd
raw_raster_folder_mean = C:\IPCCH_source_data\GOSIF_GPP\downloads_mean
raw_raster_folder_sd = C:\IPCCH_source_data\GOSIF_GPP\downloads_sd
output_folder = C:\IPCCH_source_data\GOSIF_GPP\output_ch
zone_field = fid

[viirs]
source_note = Production nightlight source is VIIRS; DMSP_OLS in paths is a legacy local folder name.
raw_tile_folder = C:\IPCCH_source_data\DMSP_OLS\image\nightlight
mosaic_folder = C:\IPCCH_source_data\DMSP_OLS\image\nightlight_mosaic
output_folder = C:\IPCCH_source_data\DMSP_OLS\output_ch
zone_field = fid

[tabular]
acled_raw_file = C:\IPCCH_source_data\ACLED\ACLED Data_2026-05-11_ipcch.csv
fao_raw_file_1 = C:\IPCCH_source_data\FAO\FAO_DATA_FOR_MIGUEL.xlsx
fao_raw_file_2 = C:\IPCCH_source_data\FAO\FOOD_CRISIS_FAO_PRICE_DATA_04012026.xlsx
wb_folder = C:\IPCCH_source_data\WBG
wfp_raw_file = C:\IPCCH_source_data\WFP\Prices-Export-Tue Dec 02 2025 16_03_28 GMT-0500.csv
tabular_output_root = C:\IPCCH_source_data

[ipc_api]
output_folder = ${PROJECT_ROOT}\curl_IPC\outputs
start_year = 2017
end_year = 2026
api_key_env_var = IPCINFO_API_KEY
